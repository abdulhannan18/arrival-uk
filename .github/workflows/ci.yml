name: Arrival UK CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Lint + Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend/functions
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/functions/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Repository quality gate
        working-directory: ${{ github.workspace }}
        run: bash Scripts/quality_gate.sh

      - name: Dependency security audit
        run: |
          set -euo pipefail
          attempts=3
          delay_seconds=2

          for attempt in $(seq 1 "$attempts"); do
            set +e
            npm audit --omit=dev > /tmp/npm-audit.log 2>&1
            status=$?
            set -e

            cat /tmp/npm-audit.log

            if [ "$status" -eq 0 ]; then
              echo "npm audit passed."
              exit 0
            fi

            if grep -qiE "audit endpoint returned an error|ECONNRESET|ETIMEDOUT|EAI_AGAIN|ENOTFOUND|socket hang up|503 Service Unavailable|504 Gateway Timeout" /tmp/npm-audit.log; then
              if [ "$attempt" -lt "$attempts" ]; then
                echo "Transient npm audit network failure (attempt ${attempt}/${attempts}); retrying in ${delay_seconds}s..."
                sleep "$delay_seconds"
                delay_seconds=$((delay_seconds * 2))
                continue
              fi
              echo "npm audit endpoint unavailable after ${attempts} attempts; failing CI to keep signal strict."
            fi

            echo "npm audit failed."
            exit "$status"
          done

      - name: Setup Java
        uses: actions/setup-java@3a4f6e1af504cf6a31855d4f7f1d32c5b19d2d3a # v4.7.1
        with:
          distribution: temurin
          java-version: '21'

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Upload backend diagnostics
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: backend-logs
          path: |
            /tmp/npm-audit.log
          if-no-files-found: ignore

  ios:
    name: iOS Validate + Build
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Show line counts
        run: bash Scripts/line_counts.sh

      - name: Repository quality gate
        run: bash Scripts/quality_gate.sh

      - name: Validate content payloads
        run: swift Scripts/validate_content.swift

      - name: iOS unit smoke tests
        run: bash Scripts/run_ios_unit_smoke.sh

      - name: Resolve Swift packages
        run: |
          mkdir -p "$HOME/Library/Caches/arrivaluk-source-packages"
          xcodebuild \
            -project "arrival uk.xcodeproj" \
            -scheme "arrival uk" \
            -clonedSourcePackagesDirPath "$HOME/Library/Caches/arrivaluk-source-packages" \
            -resolvePackageDependencies

      - name: Pick simulator
        id: pick_sim
        run: |
          set -euo pipefail
          SIM_NAME="$(xcrun simctl list devices available \
            | awk -F '[()]' '/iPhone 15/ {gsub(/^[[:space:]]+/, "", $1); print $1; exit}')"

          if [ -z "${SIM_NAME}" ]; then
            SIM_NAME="$(xcrun simctl list devices available \
              | awk -F '[()]' '/iPhone/ {gsub(/^[[:space:]]+/, "", $1); print $1; exit}')"
          fi

          if [ -z "${SIM_NAME}" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi

          echo "sim_name=${SIM_NAME}" >> "$GITHUB_OUTPUT"
          echo "Using simulator: ${SIM_NAME}"

      - name: Build app
        run: |
          xcodebuild \
            -project "arrival uk.xcodeproj" \
            -scheme "arrival uk" \
            -destination "platform=iOS Simulator,name=${{ steps.pick_sim.outputs.sim_name }}" \
            -clonedSourcePackagesDirPath "$HOME/Library/Caches/arrivaluk-source-packages" \
            -disableAutomaticPackageResolution \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run XCTest suite
        run: |
          xcodebuild \
            -project "arrival uk.xcodeproj" \
            -scheme "arrival uk" \
            -destination "platform=iOS Simulator,name=${{ steps.pick_sim.outputs.sim_name }}" \
            -parallel-testing-enabled NO \
            -maximum-concurrent-test-simulator-destinations 1 \
            -maximum-parallel-testing-workers 1 \
            -resultBundlePath /tmp/arrivaluk-tests.xcresult \
            -enableCodeCoverage YES \
            -clonedSourcePackagesDirPath "$HOME/Library/Caches/arrivaluk-source-packages" \
            -disableAutomaticPackageResolution \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: iOS Coverage Gate
        run: IOS_XCRESULT_PATH=/tmp/arrivaluk-tests.xcresult bash Scripts/quality_gate.sh

      - name: Static analyze
        run: |
          xcodebuild \
            -project "arrival uk.xcodeproj" \
            -scheme "arrival uk" \
            -destination "platform=iOS Simulator,name=${{ steps.pick_sim.outputs.sim_name }}" \
            -clonedSourcePackagesDirPath "$HOME/Library/Caches/arrivaluk-source-packages" \
            -disableAutomaticPackageResolution \
            CODE_SIGNING_ALLOWED=NO \
            analyze

      - name: Strict iOS smoke
        run: bash Scripts/strict_smoke.sh

      - name: Upload iOS diagnostics
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: ios-xcresults
          path: |
            /tmp/arrivaluk-tests.xcresult
            ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          if-no-files-found: ignore
