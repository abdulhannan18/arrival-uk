name: Arrival UK CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Lint + Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend/functions
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/functions/package-lock.json

      - name: Restore backend node_modules cache
        id: backend_modules_cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.3
        with:
          path: backend/functions/node_modules
          key: backend-node20-${{ runner.os }}-${{ hashFiles('backend/functions/package-lock.json') }}

      - name: Install deps
        env:
          BACKEND_MODULES_CACHE_HIT: ${{ steps.backend_modules_cache.outputs.cache-hit }}
        run: |
          set -euo pipefail

          if [ "${BACKEND_MODULES_CACHE_HIT}" = "true" ] && [ -d node_modules ]; then
            echo "node_modules cache hit; skipping npm ci."
            exit 0
          fi

          attempts=3
          delay_seconds=2
          export npm_config_cache="${RUNNER_TEMP:-/tmp}/arrivaluk-npm-cache"
          mkdir -p "${npm_config_cache}"

          for attempt in $(seq 1 "$attempts"); do
            set +e
            npm ci --prefer-offline --no-audit --no-fund > /tmp/npm-ci.log 2>&1
            status=$?
            set -e

            cat /tmp/npm-ci.log

            if [ "$status" -eq 0 ]; then
              echo "npm ci passed."
              exit 0
            fi

            if grep -qiE "ECONNRESET|ETIMEDOUT|EAI_AGAIN|ENOTFOUND|socket hang up|503 Service Unavailable|504 Gateway Timeout|network timeout|fetch failed" /tmp/npm-ci.log; then
              if [ "$attempt" -lt "$attempts" ]; then
                echo "Transient npm install failure (attempt ${attempt}/${attempts}); retrying in ${delay_seconds}s..."
                npm cache clean --force >/dev/null 2>&1 || true
                rm -rf node_modules
                sleep "$delay_seconds"
                delay_seconds=$((delay_seconds * 2))
                continue
              fi
            fi

            echo "npm ci failed."
            exit "$status"
          done

      - name: Repository quality gate
        working-directory: ${{ github.workspace }}
        run: bash Scripts/quality_gate.sh

      - name: Dependency security audit
        run: |
          set -euo pipefail
          attempts=3
          delay_seconds=2

          for attempt in $(seq 1 "$attempts"); do
            set +e
            npm audit --omit=dev > /tmp/npm-audit.log 2>&1
            status=$?
            set -e

            cat /tmp/npm-audit.log

            if [ "$status" -eq 0 ]; then
              echo "npm audit passed."
              exit 0
            fi

            if grep -qiE "audit endpoint returned an error|ECONNRESET|ETIMEDOUT|EAI_AGAIN|ENOTFOUND|socket hang up|503 Service Unavailable|504 Gateway Timeout" /tmp/npm-audit.log; then
              if [ "$attempt" -lt "$attempts" ]; then
                echo "Transient npm audit network failure (attempt ${attempt}/${attempts}); retrying in ${delay_seconds}s..."
                sleep "$delay_seconds"
                delay_seconds=$((delay_seconds * 2))
                continue
              fi
              echo "npm audit endpoint unavailable after ${attempts} attempts; failing CI to keep signal strict."
            fi

            echo "npm audit failed."
            exit "$status"
          done

      - name: Setup Java
        uses: actions/setup-java@3a4f6e1af504cf6a31855d4f7f1d32c5b19d2d3a # v4.7.1
        with:
          distribution: temurin
          java-version: '21'

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Upload backend diagnostics
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: backend-logs
          path: |
            /tmp/npm-ci.log
            /tmp/npm-audit.log
          if-no-files-found: ignore

  ios:
    name: iOS Validate + Build
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Restore Swift package cache
        id: swiftpm_cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.3
        with:
          path: ~/Library/Caches/arrivaluk-source-packages
          key: swiftpm-${{ runner.os }}-${{ hashFiles('arrival uk.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Show line counts
        run: bash Scripts/line_counts.sh

      - name: Repository quality gate
        run: bash Scripts/quality_gate.sh

      - name: Validate content payloads
        run: swift Scripts/validate_content.swift

      - name: iOS unit smoke tests
        run: bash Scripts/run_ios_unit_smoke.sh

      - name: Resolve Swift packages
        env:
          SWIFTPM_CACHE_HIT: ${{ steps.swiftpm_cache.outputs.cache-hit }}
        run: |
          set -euo pipefail
          attempts=3
          delay_seconds=5
          packages_dir="$HOME/Library/Caches/arrivaluk-source-packages"

          if [ "${SWIFTPM_CACHE_HIT}" = "true" ] && [ -f "${packages_dir}/workspace-state.json" ]; then
            echo "Swift package cache hit; skipping package resolution."
            exit 0
          fi

          for attempt in $(seq 1 "$attempts"); do
            mkdir -p "$packages_dir"

            set +e
            xcodebuild \
              -project "arrival uk.xcodeproj" \
              -scheme "arrival uk" \
              -clonedSourcePackagesDirPath "$packages_dir" \
              -onlyUsePackageVersionsFromResolvedFile \
              -resolvePackageDependencies > /tmp/arrivaluk-resolve-packages.log 2>&1
            status=$?
            set -e

            cat /tmp/arrivaluk-resolve-packages.log

            if [ "$status" -eq 0 ]; then
              echo "Swift package resolution passed."
              exit 0
            fi

            if grep -qiE "RPC failed|early EOF|Connection reset by peer|Could not resolve host|network connection was lost|Operation timed out|timed out|502 Bad Gateway|503 Service Unavailable|504 Gateway Timeout|failed to clone" /tmp/arrivaluk-resolve-packages.log; then
              if [ "$attempt" -lt "$attempts" ]; then
                echo "Transient Swift package resolution failure (attempt ${attempt}/${attempts}); retrying in ${delay_seconds}s..."
                rm -rf "$packages_dir"
                sleep "$delay_seconds"
                delay_seconds=$((delay_seconds * 2))
                continue
              fi
            fi

            echo "Swift package resolution failed."
            exit "$status"
          done

      - name: Pick simulator
        id: pick_sim
        run: |
          set -euo pipefail
          SIM_NAME="$(xcrun simctl list devices available \
            | awk -F '[()]' '/iPhone 15/ {gsub(/^[[:space:]]+/, "", $1); print $1; exit}')"

          if [ -z "${SIM_NAME}" ]; then
            SIM_NAME="$(xcrun simctl list devices available \
              | awk -F '[()]' '/iPhone/ {gsub(/^[[:space:]]+/, "", $1); print $1; exit}')"
          fi

          if [ -z "${SIM_NAME}" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi

          echo "sim_name=${SIM_NAME}" >> "$GITHUB_OUTPUT"
          echo "Using simulator: ${SIM_NAME}"

      - name: Build app
        run: |
          set -euo pipefail
          xcodebuild \
            -project "arrival uk.xcodeproj" \
            -scheme "arrival uk" \
            -destination "platform=iOS Simulator,name=${{ steps.pick_sim.outputs.sim_name }}" \
            -clonedSourcePackagesDirPath "$HOME/Library/Caches/arrivaluk-source-packages" \
            -disableAutomaticPackageResolution \
            CODE_SIGNING_ALLOWED=NO \
            build | tee /tmp/arrivaluk-build.log
          exit ${PIPESTATUS[0]}

      - name: Run XCTest suite
        run: |
          set -euo pipefail
          xcodebuild \
            -project "arrival uk.xcodeproj" \
            -scheme "arrival uk" \
            -destination "platform=iOS Simulator,name=${{ steps.pick_sim.outputs.sim_name }}" \
            -parallel-testing-enabled NO \
            -maximum-concurrent-test-simulator-destinations 1 \
            -maximum-parallel-testing-workers 1 \
            -resultBundlePath /tmp/arrivaluk-tests.xcresult \
            -enableCodeCoverage YES \
            -clonedSourcePackagesDirPath "$HOME/Library/Caches/arrivaluk-source-packages" \
            -disableAutomaticPackageResolution \
            CODE_SIGNING_ALLOWED=NO \
            test | tee /tmp/arrivaluk-test.log
          exit ${PIPESTATUS[0]}

      - name: iOS Coverage Gate
        run: IOS_XCRESULT_PATH=/tmp/arrivaluk-tests.xcresult bash Scripts/quality_gate.sh

      - name: Static analyze
        run: |
          set -euo pipefail
          xcodebuild \
            -project "arrival uk.xcodeproj" \
            -scheme "arrival uk" \
            -destination "platform=iOS Simulator,name=${{ steps.pick_sim.outputs.sim_name }}" \
            -clonedSourcePackagesDirPath "$HOME/Library/Caches/arrivaluk-source-packages" \
            -disableAutomaticPackageResolution \
            CODE_SIGNING_ALLOWED=NO \
            analyze | tee /tmp/arrivaluk-analyze.log
          exit ${PIPESTATUS[0]}

      - name: Strict iOS smoke
        run: bash Scripts/strict_smoke.sh

      - name: Upload iOS diagnostics
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: ios-xcresults
          path: |
            /tmp/arrivaluk-tests.xcresult
            /tmp/arrivaluk-resolve-packages.log
            /tmp/arrivaluk-build.log
            /tmp/arrivaluk-test.log
            /tmp/arrivaluk-analyze.log
            ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          if-no-files-found: ignore
